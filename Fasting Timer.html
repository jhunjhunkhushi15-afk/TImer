 = Math.floor((secs % 3600) / 60);\n  return h + ':' + String(m).padStart(2, '0');\n}\n\nfunction tick() {\n  elapsed = (Date.now() - startTime) / 1000;\n  if (elapsed >= TOTAL) {\n    elapsed = TOTAL;\n    clearInterval(ticker);\n    done = true;\n    render();\n    mainBtn.textContent = 'Done!';\n    mainBtn.disabled = true;\n    statusEl.innerHTML = '<span class=\"done-msg\">18 hours complete — great work!<\u002Fspan>';\n    return;\n  }\n  render();\n}\n\nfunction render() {\n  const rem = Math.max(0, TOTAL - elapsed);\n  const pct = Math.min(1, elapsed / TOTAL);\n  ring.style.strokeDashoffset = circ * (1 - pct);\n  timeEl.textContent = fmt(rem);\n  pctEl.textContent = Math.floor(pct * 100) + '%';\n  if (done) labelEl.textContent = 'complete';\n}\n\nfunction beginFastFrom(ts) {\n  startTime = ts;\n  mainBtn.textContent = 'Fasting...';\n  mainBtn.disabled = true;\n  chooseBtn.disabled = true;\n  statusEl.textContent = 'Fast in progress';\n  resetBtn.style.display = 'inline-block';\n  tick(); // immediate render\n  ticker = setInterval(tick, 1000);\n}\n\nfunction handleMain() {\n  if (!startTime) beginFastFrom(Date.now());\n}\n\nfunction handleReset() {\n  clearInterval(ticker);\n  startTime = null; elapsed = 0; done = false;\n  ring.style.strokeDashoffset = circ;\n  timeEl.textContent = '18:00';\n  labelEl.textContent = 'hrs remaining';\n  pctEl.textContent = '0%';\n  statusEl.textContent = 'Ready to start';\n  mainBtn.textContent = 'Start fast';\n  mainBtn.disabled = false;\n  chooseBtn.disabled = false;\n  resetBtn.style.display = 'none';\n}\n\n/* ---------- iOS-style picker ---------- */\nconst ITEM_H = 36;\nconst pickerModal = document.getElementById('pickerModal');\nconst wheelHour = document.getElementById('wheelHour');\nconst wheelMin  = document.getElementById('wheelMin');\nconst wheelMer  = document.getElementById('wheelMer');\nconst wheelHourInner = document.getElementById('wheelHourInner');\nconst wheelMinInner  = document.getElementById('wheelMinInner');\nconst wheelMerInner  = document.getElementById('wheelMerInner');\nconst previewEl = document.getElementById('preview');\nconst sheetSubtitleEl = document.getElementById('sheetSubtitle');\n\nfunction buildWheel(innerEl, items) {\n  innerEl.innerHTML = items.map(v => `<div class=\"wheel-item\">${v}<\u002Fdiv>`).join('');\n}\n\n// Hours 1–12, Minutes 00–59, AM/PM\nconst HOURS = Array.from({length: 12}, (_, i) => String(i + 1));\nconst MINS  = Array.from({length: 60}, (_, i) => String(i).padStart(2, '0'));\nconst MERS  = ['AM', 'PM'];\n\nbuildWheel(wheelHourInner, HOURS);\nbuildWheel(wheelMinInner,  MINS);\nbuildWheel(wheelMerInner,  MERS);\n\nfunction setWheel(wheel, items, value) {\n  const idx = items.indexOf(String(value));\n  const pos = Math.max(0, idx);\n  // Defer to ensure wheel is visible (layout ready)\n  requestAnimationFrame(() => {\n    wheel.scrollTop = pos * ITEM_H;\n  });\n}\n\nfunction readWheel(wheel, items) {\n  const idx = Math.round(wheel.scrollTop / ITEM_H);\n  return items[Math.max(0, Math.min(items.length - 1, idx))];\n}\n\nfunction getSelectedDate() {\n  const h12 = parseInt(readWheel(wheelHour, HOURS), 10);\n  const m   = parseInt(readWheel(wheelMin,  MINS),  10);\n  const mer = readWheel(wheelMer, MERS);\n  let h = h12 % 12;\n  if (mer === 'PM') h += 12;\n\n  const now = new Date();\n  const selected = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);\n  // If selected time is in the future, assume it was yesterday.\n  if (selected.getTime() > now.getTime()) {\n    selected.setDate(selected.getDate() - 1);\n  }\n  return selected;\n}\n\nfunction updatePreview() {\n  const d = getSelectedDate();\n  const now = new Date();\n  const diffSec = Math.max(0, Math.floor((now - d) / 1000));\n  const h = Math.floor(diffSec / 3600);\n  const m = Math.floor((diffSec % 3600) / 60);\n  previewEl.innerHTML = `Fast has been running for <strong>${h}h ${m}m<\u002Fstrong>`;\n\n  const isToday = d.toDateString() === now.toDateString();\n  sheetSubtitleEl.textContent = isToday ? 'Today' : 'Yesterday';\n}\n\nfunction attachWheelSnap(wheel, items) {\n  let snapTimer = null;\n  wheel.addEventListener('scroll', () => {\n    updatePreview();\n    clearTimeout(snapTimer);\n    snapTimer = setTimeout(() => {\n      const idx = Math.round(wheel.scrollTop / ITEM_H);\n      wheel.scrollTo({ top: idx * ITEM_H, behavior: 'smooth' });\n    }, 120);\n  });\n}\nattachWheelSnap(wheelHour, HOURS);\nattachWheelSnap(wheelMin,  MINS);\nattachWheelSnap(wheelMer,  MERS);\n\nfunction openPicker() {\n  // Default to \"now\" rounded to the nearest 5 min\n  const now = new Date();\n  const rounded = new Date(now);\n  rounded.setMinutes(Math.floor(now.getMinutes() / 5) * 5, 0, 0);\n  const h = rounded.getHours();\n  const h12 = ((h + 11) % 12) + 1;\n  const mer = h >= 12 ? 'PM' : 'AM';\n  const mm = String(rounded.getMinutes()).padStart(2, '0');\n\n  pickerModal.classList.add('open');\n  setWheel(wheelHour, HOURS, h12);\n  setWheel(wheelMin,  MINS,  mm);\n  setWheel(wheelMer,  MERS,  mer);\n  setTimeout(updatePreview, 60);\n}\n\nfunction closePicker() {\n  pickerModal.classList.remove('open');\n}\n\nfunction confirmPicker() {\n  const d = getSelectedDate();\n  closePicker();\n  beginFastFrom(d.getTime());\n}\n\nfunction quickSet(hoursAgo) {\n  const d = new Date(Date.now() - hoursAgo * 3600 * 1000);\n  const h = d.getHours();\n  const h12 = ((h + 11) % 12) + 1;\n  const mer = h >= 12 ? 'PM' : 'AM';\n  const mm = String(d.getMinutes()).padStart(2, '0');\n  setWheel(wheelHour, HOURS, h12);\n  setWheel(wheelMin,  MINS,  mm);\n  setWheel(wheelMer,  MERS,  mer);\n  setTimeout(updatePreview, 60);\n}\n\nfunction quickSetNow() { quickSet(0); }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
