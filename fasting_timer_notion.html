<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fasting Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #37352f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    padding: 2rem 1rem;
  }
  .label-top {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9b9a97;
  }
  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
  }
  svg.ring {
    width: 220px;
    height: 220px;
    transform: rotate(-90deg);
  }
  .ring-bg {
    fill: none;
    stroke: #f1f0ef;
    stroke-width: 14;
  }
  .ring-fill {
    fill: none;
    stroke: #2eaadc;
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .ring-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 160px;
  }
  .time-left {
    font-size: 36px;
    font-weight: 600;
    color: #37352f;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .time-label {
    font-size: 11px;
    color: #9b9a97;
    margin-top: 5px;
    letter-spacing: 0.02em;
  }
  .pct {
    font-size: 11px;
    color: #2eaadc;
    margin-top: 3px;
    font-weight: 500;
  }
  .status {
    font-size: 13px;
    color: #9b9a97;
  }
  .btn {
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid rgba(55,53,47,0.16);
    color: #37352f;
    background: #ffffff;
    transition: background 0.1s;
    font-family: inherit;
    box-shadow: rgba(15,15,15,0.1) 0px 0px 0px 1px inset;
  }
  .btn:hover { background: #f1f0ef; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn:disabled:hover { background: #ffffff; }
  .btn.primary {
    background: #2eaadc;
    color: #ffffff;
    border: none;
    box-shadow: none;
    padding: 7px 18px;
  }
  .btn.primary:hover { background: #2699c8; }
  .btn.primary:disabled:hover { background: #2eaadc; }
  .btn-row { display: flex; gap: 8px; align-items: center; }
  .done-msg { color: #0f7b6c; font-size: 13px; font-weight: 500; }
  .divider {
    width: 100%;
    max-width: 240px;
    height: 1px;
    background: #e9e9e7;
  }
</style>
</head>
<body>
<div class="container">
  <div class="label-top">Intermittent fast — 18h</div>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="94"/>
      <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="94"/>
    </svg>
    <div class="ring-center">
      <div class="time-left" id="timeLeft">18:00</div>
      <div class="time-label" id="timeLabel">hrs remaining</div>
      <div class="pct" id="pctLabel">0%</div>
    </div>
  </div>

  <div class="status" id="statusMsg">Ready to start</div>

  <div class="btn-row">
    <button class="btn primary" id="mainBtn" onclick="handleMain()">Start fast</button>
    <button class="btn" id="resetBtn" onclick="handleReset()" style="display:none">Reset</button>
  </div>
</div>

<script>
const TOTAL = 18 * 3600;
const circ = 2 * Math.PI * 94;
const ring = document.getElementById('ringFill');
const timeEl = document.getElementById('timeLeft');
const labelEl = document.getElementById('timeLabel');
const pctEl = document.getElementById('pctLabel');
const statusEl = document.getElementById('statusMsg');
const mainBtn = document.getElementById('mainBtn');
const resetBtn = document.getElementById('resetBtn');

ring.style.strokeDasharray = circ;
ring.style.strokeDashoffset = circ;

let startTime = null;
let elapsed = 0;
let ticker = null;
let done = false;

function fmt(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h + ':' + String(m).padStart(2, '0');
}

function tick() {
  elapsed = (Date.now() - startTime) / 1000;
  if (elapsed >= TOTAL) {
    elapsed = TOTAL;
    clearInterval(ticker);
    done = true;
    render();
    mainBtn.textContent = 'Done!';
    mainBtn.disabled = true;
    statusEl.innerHTML = '<span class="done-msg">18 hours complete — great work!</span>';
    return;
  }
  render();
}

function render() {
  const rem = Math.max(0, TOTAL - elapsed);
  const pct = Math.min(1, elapsed / TOTAL);
  ring.style.strokeDashoffset = circ * (1 - pct);
  timeEl.textContent = fmt(rem);
  pctEl.textContent = Math.floor(pct * 100) + '%';
  if (done) labelEl.textContent = 'complete';
}

function handleMain() {
  if (!startTime) {
    startTime = Date.now();
    mainBtn.textContent = 'Fasting...';
    mainBtn.disabled = true;
    statusEl.textContent = 'Fast in progress';
    resetBtn.style.display = 'inline-block';
    ticker = setInterval(tick, 1000);
  }
}

function handleReset() {
  clearInterval(ticker);
  startTime = null; elapsed = 0; done = false;
  ring.style.strokeDashoffset = circ;
  timeEl.textContent = '18:00';
  labelEl.textContent = 'hrs remaining';
  pctEl.textContent = '0%';
  statusEl.textContent = 'Ready to start';
  mainBtn.textContent = 'Start fast';
  mainBtn.disabled = false;
  resetBtn.style.display = 'none';
}
</script>
</body>
</html>
